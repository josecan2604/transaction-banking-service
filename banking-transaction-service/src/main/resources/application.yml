server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true


  flyway:
    enabled: true
    locations: classpath:db/migration

  logging:
    level:
      org.flywaydb: DEBUG
jwt:
  secret: mySecretKeymySecretKeymySecretKey123456
  expiration: 3600000