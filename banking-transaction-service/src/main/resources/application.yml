server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ledgerdb
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true


  flyway:
    enabled: true
    locations: classpath:db/migration

  logging:
    level:
      org.flywaydb: DEBUG
jwt:
  secret: mySecretKeymySecretKeymySecretKey123456
  expiration: 3600000